name: Deploy website container

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/site-deploy.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/zipp-site:latest
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
  SITE_PORT: ${{ secrets.SITE_PORT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push site image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Redeploy on remote Docker host
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v0.1.10
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SITE_PORT: ${{ env.SITE_PORT }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          envs: IMAGE_NAME,SITE_PORT
          script: |
            set -e
            PORT="${SITE_PORT:-8001}"
            docker pull "$IMAGE_NAME"
            if docker ps -a --format '{{.Names}}' | grep -q '^zipp-site$'; then
              docker rm -f zipp-site
            fi
            docker run -d --name zipp-site --restart unless-stopped -p "${PORT}:80" "$IMAGE_NAME"
